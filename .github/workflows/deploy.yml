# ============================================================
# GitHub Actions: Build + Deploy GMP Validation Dashboard
# Thay placeholder bằng Secrets → Deploy lên GitHub Pages
# ============================================================
name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into index.html
        run: |
          sed -i "s|__SUPABASE_URL__|${{ secrets.SUPABASE_URL }}|g" index.html
          sed -i "s|__SUPABASE_ANON_KEY__|${{ secrets.SUPABASE_ANON_KEY }}|g" index.html
          sed -i "s|__WEBHOOK_BASE__|${{ secrets.WEBHOOK_BASE }}|g" index.html
          if grep -q '__SUPABASE_URL__\|__SUPABASE_ANON_KEY__\|__WEBHOOK_BASE__' index.html; then
            echo "❌ LỖI: Còn placeholder chưa thay. Kiểm tra lại Secrets."
            exit 1
          fi
          echo "✅ Đã thay toàn bộ placeholder."

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
