# ============================================================
# GitHub Actions: Build (Vite) + Deploy GMP Validation Dashboard (TS)
# PHA 1C: semantic CI guard (exact URL, JWT ref, cấm ref cũ) + release manifest.
# Dự án Vite nằm trong THƯ MỤC CON app/ → app vanilla ở gốc repo GIỮ NGUYÊN.
# Đọc REPOSITORY VARIABLES (vars.*) → inject thành VITE_* lúc build → deploy app/dist.
# 3 giá trị KHÔNG bí mật (anon key public-safe) → đặt ở tab "Variables".
# Tên Variable GIỮ NGUYÊN: SUPABASE_URL · SUPABASE_ANON_KEY · WEBHOOK_BASE
# ============================================================
name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    defaults:
      run:
        working-directory: app   # mọi bước 'run' chạy trong app/ (dự án Vite)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Guard 1: 3 Variables phải có giá trị, không placeholder,
      #           và PHẢI trỏ đúng project bdttccztjtrcaztjgkot (semantic check).
      - name: Kiểm tra Variables (trước build)
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
          WEBHOOK_BASE: ${{ vars.WEBHOOK_BASE }}
        run: |
          fail=0
          NEW_REF="bdttccztjtrcaztjgkot"
          OLD_REF="xrpnlpfcoarouoqkhgfp"

          check_present() {
            name="$1"; val="$2"
            if [ -z "$val" ]; then
              echo "FAIL $name RONG -- tao REPOSITORY VARIABLE (tab Variables, KHONG phai Secrets)."
              fail=1; return 1
            fi
            if printf '%s' "$val" | grep -qE '^__.*__$'; then
              echo "FAIL $name con placeholder ('$val')."
              fail=1; return 1
            fi
            echo "OK   $name co gia tri."
          }

          check_present SUPABASE_URL      "$SUPABASE_URL"
          check_present SUPABASE_ANON_KEY "$SUPABASE_ANON_KEY"
          check_present WEBHOOK_BASE      "$WEBHOOK_BASE"

          # Semantic: SUPABASE_URL phải chứa đúng project ref mới.
          if ! printf '%s' "$SUPABASE_URL" | grep -qF "$NEW_REF"; then
            echo "FAIL SUPABASE_URL khong chua project ref '$NEW_REF' (hien tai: $SUPABASE_URL)."
            fail=1
          else
            echo "OK   SUPABASE_URL tro dung project $NEW_REF."
          fi

          if printf '%s' "$SUPABASE_URL" | grep -qF "$OLD_REF"; then
            echo "FAIL SUPABASE_URL van con project ref cu '$OLD_REF'."
            fail=1
          fi

          # Semantic: decode JWT payload (base64url → standard base64) và kiểm 'ref'.
          jwt_raw=$(printf '%s' "$SUPABASE_ANON_KEY" | cut -d. -f2)
          # Chuyển base64url sang standard base64
          jwt_std=$(printf '%s' "$jwt_raw" | tr -- '-_' '+/')
          # Thêm padding
          case $((${#jwt_std} % 4)) in
            2) jwt_std="${jwt_std}==";;
            3) jwt_std="${jwt_std}=";;
          esac
          decoded=$(printf '%s' "$jwt_std" | base64 -d 2>/dev/null || echo "")

          if printf '%s' "$decoded" | grep -qF "$NEW_REF"; then
            echo "OK   SUPABASE_ANON_KEY JWT ref = $NEW_REF."
          else
            echo "FAIL SUPABASE_ANON_KEY JWT ref khong phai $NEW_REF -- sai project anon key."
            fail=1
          fi

          if printf '%s' "$decoded" | grep -qF "$OLD_REF"; then
            echo "FAIL SUPABASE_ANON_KEY JWT van chua ref cu '$OLD_REF'."
            fail=1
          fi

          [ "$fail" = "0" ] || { echo "DUNG: cau hinh sai project. Kiem tra tab Variables."; exit 1; }

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Cai dependencies (npm ci)
        run: npm ci

      # Vite bake VITE_* vào bundle lúc build (anon-key-only).
      - name: Build (inject VITE_* tu Variables)
        env:
          VITE_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
          VITE_WEBHOOK_BASE: ${{ vars.WEBHOOK_BASE }}
        run: npm run build

      # Guard 2: dist không còn placeholder cũ, chứa URL thật,
      #          KHÔNG chứa project ref cũ (xrpnlpfcoarouoqkhgfp).
      - name: Kiem tra dist (sau build)
        env:
          VITE_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
        run: |
          NEW_REF="bdttccztjtrcaztjgkot"
          OLD_REF="xrpnlpfcoarouoqkhgfp"

          if grep -rqE '__SUPABASE_URL__|__SUPABASE_ANON_KEY__|__WEBHOOK_BASE__' dist; then
            echo "FAIL Con placeholder kieu cu trong dist."
            exit 1
          fi

          if ! grep -rqF "$VITE_SUPABASE_URL" dist; then
            echo "FAIL Khong thay SUPABASE_URL trong dist -- inject that bai."
            exit 1
          fi

          if grep -rqF "$OLD_REF" dist; then
            echo "FAIL dist chua project ref cu '$OLD_REF' -- xoa hardcode hoac doi Variable."
            exit 1
          fi

          echo "OK   dist sach: inject dung project $NEW_REF, khong con ref cu."

      # Release manifest: ghi Git SHA + migration version + n8n activeVersionIds.
      # Chạy TRƯỚC upload để manifest nằm trong artifact.
      - name: Tao release manifest
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > dist/release-manifest.json << EOF
          {
            "built_at": "$TIMESTAMP",
            "git_sha": "$GITHUB_SHA",
            "migration_version": "015",
            "n8n_active_version_ids": {
              "WF-01": "2c707741",
              "WF-02": "767e4afb",
              "WF-03": "66c5e44a",
              "WF-04": "fb751091",
              "WF-05": "1a3919c5",
              "WF-06": "f7b7ee5a",
              "WF-07": "8f2d714c",
              "WF-09": "c03ee46b",
              "WF-11": "bad508fe",
              "WF-12": "8d6c7110"
            },
            "supabase_project": "bdttccztjtrcaztjgkot"
          }
          EOF
          echo "OK   release-manifest.json:"
          cat dist/release-manifest.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # path tính từ GỐC repo (không theo working-directory)
      - name: Upload artifact (app/dist)
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'app/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
