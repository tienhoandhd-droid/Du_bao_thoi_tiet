# ============================================================
# GitHub Actions: Build + Deploy GMP Validation Dashboard
# Đọc REPOSITORY VARIABLES (vars.*) → thay vào js/config.js → Deploy Pages
# (3 giá trị này KHÔNG bí mật: anon key công khai, URL & webhook công khai
#  → đặt ở tab "Variables" là hợp lý. Nếu muốn dùng tab "Secrets" thì đổi
#  vars.X thành secrets.X bên dưới.)
# ============================================================
name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject config (from Variables) into js/config.js
        run: |
          sed -i "s|__SUPABASE_URL__|${{ vars.SUPABASE_URL }}|g" js/config.js
          sed -i "s|__SUPABASE_ANON_KEY__|${{ vars.SUPABASE_ANON_KEY }}|g" js/config.js
          sed -i "s|__WEBHOOK_BASE__|${{ vars.WEBHOOK_BASE }}|g" js/config.js

          # 1) Còn placeholder? (biến chưa tồn tại đúng tên ở tab Variables)
          if grep -q '__SUPABASE_URL__\|__SUPABASE_ANON_KEY__\|__WEBHOOK_BASE__' js/config.js; then
            echo "❌ Còn placeholder — chưa thay được. Kiểm tra tên Variables."
            exit 1
          fi
          # 2) Giá trị rỗng? (thường do đặt nhầm ở tab Secrets thay vì Variables)
          if grep -qE "SUPABASE_URL: *''" js/config.js; then
            echo "❌ SUPABASE_URL RỖNG. Hãy tạo REPOSITORY VARIABLE (tab Variables) tên SUPABASE_URL (không phải Secret)."
            exit 1
          fi
          if grep -qE "SUPABASE_ANON_KEY: *''" js/config.js; then
            echo "❌ SUPABASE_ANON_KEY RỖNG. Kiểm tra Variable SUPABASE_ANON_KEY."
            exit 1
          fi
          if grep -qE "WEBHOOK_BASE: *''" js/config.js; then
            echo "❌ WEBHOOK_BASE RỖNG. Kiểm tra Variable WEBHOOK_BASE."
            exit 1
          fi
          echo "✅ Đã nạp cấu hình từ Variables."
          echo "→ Kiểm tra URL đã nạp:" $(grep -oE "SUPABASE_URL: *'[^']*'" js/config.js)

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
